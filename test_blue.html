<html>
<head>
<title>TITLE</title>
<meta charset="UTF-8">
<link rel='icon' href='data:;base64,iVBORw0KGgo='>
</head>

<script type="text/javascript" src="support.js"></script>
<script type="text/javascript" src="bluepoint.js"></script>
<script type="text/javascript" src="mime.js"></script>

<script>
org = "aaaa"
orgpass = "1234"

window.addEventListener('load', function()
    {
    //console.log("Start");
    const orgOutput = document.getElementById('org');
    const passOutput = document.getElementById('pass');
    const textOutput = document.getElementById('txt');
    const binOutput = document.getElementById('bin');
    const mimeOutput = document.getElementById('mime');
    const mimeDecode = document.getElementById('decode');
    const hashOutput = document.getElementById('hash');
    const chashOutput = document.getElementById('chash');

    orgOutput.innerHTML = "org: " + org
    eeee = bluepoint_encrypt(org, passOutput.innerHTML);
    binOutput.innerHTML = "enc: " + dumphex(eeee);
    dddd = bluepoint_decrypt(eeee,  passOutput.innerHTML);
    textOutput.innerHTML = "dec: " + dddd;
    ccc = mime_encode(org)
    mimeOutput.innerHTML =  "Mime enc: " + ccc;
    mimeDecode.innerHTML =  "Mime dec: " + mime_decode(ccc);
    hashOutput.innerHTML =  "Hash:  0x" + bluepoint_hash(org).toString(16);
    chashOutput.innerHTML = "cHash: 0x" +
                    bluepoint_crypthash(org, orgpass).toString(16);

    display_time_in_status_line("status");
    } );
</script>
<body>
<center>
<h1> Bluepoint Test Page</h1>
<table>
<tr><td>
<img src=graphics/bitmap.png>
<td width=10%>
<td>
<div id=org> Hello </div>
pass: <div id=pass style="display:inline;">1234</div>
<div id=bin>    Hello</div>
<div id=txt>    Hello</div>
<div id=mime>   Hello</div>
<div id=decode> Hello</div>
<div id=hash>   Hello</div>
<div id=chash>  Hello</div>

<tr><td align=center colspan=1>
<br><div id=status> Status Line </div>

</body>
