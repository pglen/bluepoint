  <script language="JavaScript">

///////////////////////////////////////////////////////////////////////////
// This is the function that performs form verification.  It will be invoked
// from the onSubmit() event handler.  The handler should return whatever
// value this function returns.

function verify(f)

{
	//var 	ss = mime_encode(f.itext.value);
	var	ee = bluepoint_encrypt(f.itext.value, f.pass.value);

	//f.mtext.value = "'" + ss + "'";
	//f.umtext.value = mime_decode(ss);
	
	f.etext.value = escape(ee);
	f.dtext.value = bluepoint_decrypt(ee, f.pass.value);

	return false;
}
    
  </script>
  <title>TestBluePoint</title>
</head>
<body onload="display_time_in_status_line();" style="" link="#0000ff"
 vlink="#800080">
<span style="font-weight: bold;"><font size="+3">BluePoint Encryption
Test Form<br>
<br>
</font></span>
JS encryption:<br>
<br>
<form onsubmit="return verify(this); ">
  <table style="text-align: left; width: 80%;" border="0"
 cellpadding="2" cellspacing="2">
    <tbody>
      <tr>
        <td style="vertical-align: top;">Original Text:</td>
        <td style="vertical-align: top;"><input name="itext" size="64"
 type="text"> </td>
        <td style="vertical-align: top;"><br>
        </td>
      </tr>
      <tr>
        <td style="vertical-align: top;">Pass:</td>
        <td style="vertical-align: top;"><input name="pass" size="32"
 type="text"> </td>
        <td style="vertical-align: top;"><br>
        </td>
      </tr>
      <tr>
        <td style="vertical-align: top;">Mimed Text<br>
        </td>
        <td style="vertical-align: top;"><input name="mtext" size="64"
 type="text"></td>
        <td style="vertical-align: top;"><br>
        </td>
      </tr>
      <tr>
        <td style="vertical-align: top;">Unmimed Text:</td>
        <td style="vertical-align: top;"><input name="umtext" size="64"
 type="text"></td>
        <td style="vertical-align: top;"><br>
        </td>
      </tr>
      <tr>
        <td style="vertical-align: top;">Encrypted text:<br>
        </td>
        <td style="vertical-align: top;"><input name="etext" size="64"
 type="text"></td>
        <td style="vertical-align: top;"><br>
        </td>
      </tr>
      <tr>
        <td style="vertical-align: top;">Decrypted text:<br>
        </td>
        <td style="vertical-align: top;"><input name="dtext" size="64"
 type="text"></td>
      </tr>
      <tr>
        <td><br>
        </td>
        <td><input type="submit"> </td>
      </tr>
    </tbody>
  </table>
</form>
