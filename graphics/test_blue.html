// This is the function that performs form verification.  It will be invoked
// from the onSubmit() event handler.  The handler should return whatever
// value this function returns.

function verify(f)

{
//abcdefghijklmnopqrstuvwxyz

	//var 	ss = mime_encode(f.itext.value);
	var	ee = bluepoint_encrypt(f.itext.value, f.passx.value);

	//f.mtext.value = "'" + ss + "'";
	//f.umtext.value = mime_decode(ss);

	f.etext.value = dumphex(ee);
	f.dtext.value = bluepoint_decrypt(ee, f.passx.value);

	//f.htext.value = bluepoint_hash(ee);

	f.hashtext.value = bluepoint_hash(f.itext.value);
	f.chashtext.value = bluepoint_crypthash(f.itext.value, f.passx.value);

	return false;
}
